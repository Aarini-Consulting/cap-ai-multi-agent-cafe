_schema-version: "3.3.0"
ID: cafe-multi-agent
version: 1.0.0
description: AI-powered Café Multi-Agent Orchestrator with CAP

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - bash -c "cd app/chat-ui-src && npm ci && npx vite build"
        - bash -c "cd app/cafe-order-src && npm ci && npx vite build"
        - bash -c "cd app/grievance-mgr-src && npm ci && npx vite build"
        - bash -c "cd app/kitchen-mgr-src && npm ci && npx vite build"
        - npx cds build --production

# ═══════════════════════════════════════════════════════════════════
# MODULES
# ═══════════════════════════════════════════════════════════════════

modules:

  # ── CAP Service (Node.js backend + Chat UI static files) ────────
  - name: cafe-multi-agent-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 512M
    properties:
      NODE_ENV: production
      CAFE_ASSISTANT_URL: https://cafe-assistant-agent.cfapps.eu10-005.hana.ondemand.com
      KITCHEN_MANAGER_URL: https://kitchen-manager-agent.cfapps.eu10-005.hana.ondemand.com
      GRIEVANCE_MANAGER_URL: https://grievance-manager-agent.cfapps.eu10-005.hana.ondemand.com
    requires:
      - name: cafe-multi-agent-auth
      - name: cafe-multi-agent-db
      - name: cafe-multi-agent-aicore
      - name: audit-log
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HANA DB Deployer ─────────────────────────────────────────────
  - name: cafe-multi-agent-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 64M
      disk-quota: 256M
    requires:
      - name: cafe-multi-agent-db

# ═══════════════════════════════════════════════════════════════════
# RESOURCES (BTP Services)
# ═══════════════════════════════════════════════════════════════════

resources:

  # ── XSUAA (Authentication & Authorization) ───────────────────────
  - name: cafe-multi-agent-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cafe-multi-agent-${org}-${space}
        tenant-mode: dedicated

  # ── HANA Cloud (Database) ────────────────────────────────────────
  - name: cafe-multi-agent-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── SAP AI Core (Agent AI) ──────────────────────────────────────
  - name: cafe-multi-agent-aicore
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: agent-ai

  # ── Audit Log Service ───────────────────────────────────────────
  - name: audit-log
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: audit-log
