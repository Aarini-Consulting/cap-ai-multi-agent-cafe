action_groups:
  - actions:
      - type: status-update
        message: Connecting to Kitchen Manager...
      - type: agent-request
        system_alias: KITCHEN_MANAGER_AGENT
        agent_type: remote
        result_variable: "apiResponse"
      - type: message
        message:
          type: text
          markdown: true
          content: "<? apiResponse.body.artifacts[0].parts[0].text ?>"
